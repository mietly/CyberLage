      // Prevent flash of wrong theme
      (function() {
        var theme = localStorage.getItem('cyberlage-theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
